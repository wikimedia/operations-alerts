# deploy-tag: ops

groups:
  - name: haproxykafka
    rules:
      - alert: HaproxyKafkaNoMessages
        expr: '(
          sum by (hostname) (label_replace (rate(haproxykafka_valid_messages_total{cluster=~"cache_(text|upload)"}[5m]), "hostname", "$1", "instance", "(.*):.*"))
          or
          (sum by (hostname) (label_replace(up{cluster=~"cache_(text|upload)"} * 0, "hostname", "$1", "instance", "(.*):.*")))
          ) / sum by (hostname) (label_replace (rate(haproxy_frontend_http_requests_total{cluster=~"cache_(text|upload)", proxy!="stats"}[5m]), "hostname", "$1", "instance", "(.*):.*")) < 0.2
          and
          sum by (hostname) (label_replace (rate(haproxy_frontend_http_requests_total{cluster=~"cache_(text|upload)", proxy!="stats"}[5m]), "hostname", "$1", "instance", "(.*):.*")) > 0'
        for: 5m
        labels:
          team: data-engineering
          severity: warning
        annotations:
          summary: 'Unexpected rate of produced HaproxyKafka messages by {{ $labels.hostname }}'
          description: 'Haproxy on {{ $labels.hostname }} is receiving requests, but HaproxyKafka is not sending enough messages'
          dashboard: 'https://grafana.wikimedia.org/d/d3e4e37c-c1d9-47af-9aad-a08dae2b3fd5/haproxykafka?orgId=1&var-site={{ $externalLabels.site }}&var-instance={{ $labels.hostname }}'
          runbook: 'https://wikitech.wikimedia.org/wiki/HAProxyKafka#HaproxyKafkaNoMessages'
      - alert: HaproxyKafkaNoMessages
        expr: '(
          sum by (hostname) (label_replace (rate(haproxykafka_valid_messages_total{cluster=~"cache_(text|upload)"}[5m]), "hostname", "$1", "instance", "(.*):.*"))
          or
          (sum by (hostname) (label_replace(up{cluster=~"cache_(text|upload)"} * 0, "hostname", "$1", "instance", "(.*):.*")))
          ) / sum by (hostname) (label_replace (rate(haproxy_frontend_http_requests_total{cluster=~"cache_(text|upload)", proxy!="stats"}[5m]), "hostname", "$1", "instance", "(.*):.*")) < 0.1
          and
          sum by (hostname) (label_replace (rate(haproxy_frontend_http_requests_total{cluster=~"cache_(text|upload)", proxy!="stats"}[5m]), "hostname", "$1", "instance", "(.*):.*")) > 0'
        for: 5m
        labels:
          team: data-engineering
          severity: critical
        annotations:
          summary: 'Unexpected rate of produced HaproxyKafka messages by {{ $labels.hostname }}'
          description: 'Haproxy on {{ $labels.hostname }} is receiving requests, but HaproxyKafka is not sending enough messages'
          dashboard: 'https://grafana.wikimedia.org/d/d3e4e37c-c1d9-47af-9aad-a08dae2b3fd5/haproxykafka?orgId=1&var-site={{ $externalLabels.site }}&var-instance={{ $labels.hostname }}'
          runbook: 'https://wikitech.wikimedia.org/wiki/HAProxyKafka#HaproxyKafkaNoMessages'

      # Let's get concerned when we average more than 1 saturation error per second per
      # caching method, instance, and datacenter.
      - alert: HaproxyKafkaDeliveryErrors
        # Disable linting:
        # https://wikitech.wikimedia.org/wiki/Alertmanager#Prometheus_didn't_have_any_series_(promql/series)
        # pint disable promql/series
        expr: sum by (cluster, instance, site) (irate(haproxykafka_saturation_errors{channel='kafka-msg'}[5m])) >= 1
        labels:
          team: data-engineering
          severity: warning
        annotations: &haproxykafka-annotations
          summary: 'haproxykafka has {{ $labels.cluster }} saturation errors on {{ $labels.instance }}'
          description: 'haproxykafka is experiencing {{ $labels.cluster }} saturation errors on the instance {{ $labels.instance }} in the {{ $externalLabels.site }} datacenter.'
          dashboard: 'https://grafana.wikimedia.org/d/d3e4e37c-c1d9-47af-9aad-a08dae2b3fd5/haproxykafka?orgId=1&viewPanel=15&var-datasource={{ $externalLabels.site }}%20prometheus/ops&var-cp_cluster={{ $labels.cluster }}&var-instance={{ $labels.instance | reReplaceAll "^([^:]+).*" "${1}" }}'
          runbook: 'https://wikitech.wikimedia.org/wiki/HAProxyKafka'

      # Yell a little louder when enough errors become a concern.
      - alert: HaproxyKafkaDeliveryErrors
        # Disable linting:
        # https://wikitech.wikimedia.org/wiki/Alertmanager#Prometheus_didn't_have_any_series_(promql/series)
        # pint disable promql/series
        expr: sum by (cluster, instance, site) (irate(haproxykafka_saturation_errors{channel='kafka-msg'}[5m])) >= 5
        labels:
          team: data-engineering
          severity: critical
        annotations: *haproxykafka-annotations
