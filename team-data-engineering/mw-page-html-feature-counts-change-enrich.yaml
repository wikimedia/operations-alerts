# deploy-tag: k8s-dse
# deploy-site: eqiad
# Alerts are enabled only on dse-k8s.
groups:
  - name: mw-page-html-feature-counts-change-enrich
    rules:
      - alert: MediawikiPageHtmlFeatureCountsChangeEnrichJobManagerNotRunning
        expr: |
          absent(flink_jobmanager_job_uptime{kubernetes_namespace="mw-page-html-feature-counts-change-enrich", release="production", job_name="mw_page_html_feature_counts_change_enrich"})
        for: 5m
        labels:
          team: data-engineering
          severity: critical
        annotations:
          summary: "{{ $labels.job_name }} in {{$externalLabels.site}} is not running"
          description: "The {{ $labels.job_name }} job is not running"
          dashboard: 'https://grafana.wikimedia.org/d/K9x0c4aVk/flink-app?orgId=1&var-datasource={{ $externalLabels.site }}%20prometheus/k8s-dse&var-namespace={{ $labels.kubernetes_namespace }}&var-helm_release={{ $labels.release }}&var-operator_name=All&var-flink_job_name={{ $labels.job_name }}'
          dashboard_overview: 'https://grafana.wikimedia.org/d/jadfx6h/html-2b-edit-types'
          runbook: https://wikitech.wikimedia.org/wiki/MediaWiki_Event_Enrichment/HTML_Enrichment#Alerting

      - alert: MediawikiPageHtmlFeatureCountsChangeEnrichTaskManagerNotRunning
        # Task managers (workers) are not running. There is a valid deployment, but the application is not operating properly.
        expr: |
          flink_jobmanager_numRegisteredTaskManagers{kubernetes_namespace="mw-page-html-feature-counts-change-enrich", release="production"} == 0
        for: 5m
        labels:
          team: data-engineering
          severity: critical
        annotations:
          summary: "The {{ $labels.kubernetes_namespace }} Flink cluster in {{$externalLabels.site}} has no registered TaskManagers"
          description: "The {{ $labels.kubernetes_namespace }} Flink cluster in {{$externalLabels.site}} has no registered TaskManagers"
          dashboard: 'https://grafana.wikimedia.org/d/K9x0c4aVk/flink-app?orgId=1&var-datasource={{ $externalLabels.site }}%20prometheus/k8s-dse&var-namespace={{ $labels.kubernetes_namespace }}&var-helm_release={{ $labels.release }}&var-operator_name=All&var-flink_job_name=All'
          dashboard_overview: 'https://grafana.wikimedia.org/d/jadfx6h/html-2b-edit-types'
          runbook: https://wikitech.wikimedia.org/wiki/MediaWiki_Event_Enrichment/HTML_Enrichment#Alerting

      - alert: MediawikiPageHtmlFeatureCountsChangeEnrichHighErrorStreamRate
        # The percentage of messages routed to the error topic has exceeded 0.05% for 10 minutes.
        # Denominator is clamped to 1 to avoid division by zero when no messages are flowing.
        # TODO:
        # The percentage and/or duration should be updated after having run the job for a while.
        # If required, we can add an alert for # of messages instead of percentage.
        # Current max observed error rate is ~0.002%, so this should be safe for now.
        expr: |
          100 *
            sum(increase(kafka_server_BrokerTopicMetrics_MessagesIn_total{kafka_cluster="jumbo-eqiad", topic=~"(eqiad|codfw)\\.mw_page_html_feature_counts_change_enrich\\.error"}[5m]))
          /
          clamp_min(
            sum(increase(kafka_server_BrokerTopicMetrics_MessagesIn_total{kafka_cluster="jumbo-eqiad", topic=~"(eqiad|codfw)\\.(mw_page_html_feature_counts_change_enrich\\.error|mediawiki\\.page_html_feature_counts_change\\..*)"}[5m])),
            1
          )
          > 0.05
        for: 10m
        labels:
          team: data-engineering
          severity: warning
        annotations:
          summary: "High error rate for mw-page-html-feature-counts-change-enrich in {{ $externalLabels.site }}."
          description: "More than 0.05% of messages are being routed to the error topic for mw-page-html-feature-counts-change-enrich. Flink and Envoy should be checked."
          dashboard: 'https://grafana.wikimedia.org/d/jadfx6h/html-2b-edit-types'
          runbook: https://wikitech.wikimedia.org/wiki/MediaWiki_Event_Enrichment/HTML_Enrichment#Alerting

      - alert: MediawikiPageHtmlFeatureCountsChangeEnrichNoOutputMessages
        # No messages have been successfully produced to the output topic in the last 30 minutes,
        # suggesting the job has stalled or is exclusively routing to the error topic.
        expr: |
          sum(increase(kafka_server_BrokerTopicMetrics_MessagesIn_total{kafka_cluster="jumbo-eqiad", topic=~"(eqiad|codfw)\\.mediawiki\\.page_html_feature_counts_change\\..*"}[30m])) == 0
        for: 5m
        labels:
          team: data-engineering
          severity: critical
        annotations:
          summary: "No output messages produced by mw-page-html-feature-counts-change-enrich in {{ $externalLabels.site }}"
          description: "No messages have been successfully produced to the output topic in the last 30 minutes. Check if Flink and Envoy are running, and whether messages are being routed to the error topic or no messages are processed at all."
          dashboard: 'https://grafana.wikimedia.org/d/jadfx6h/html-2b-edit-types'
          runbook: https://wikitech.wikimedia.org/wiki/MediaWiki_Event_Enrichment/HTML_Enrichment#Alerting

      - alert: MediawikiPageHtmlFeatureCountsChangeEnrichHighKafkaConsumerLag
        # The application is experiencing latency in consuming from Kafka brokers.
        # This threshold and duration should match target SLO values
        # Latency is around 30 seconds, throughput is around 20msg/sec. Threshold here is double (1200) but can be adjusted as needed.
        expr: |
          flink_taskmanager_job_task_operator_KafkaSourceReader_KafkaConsumer_records_lag_max{kubernetes_namespace="mw-page-html-feature-counts-change-enrich", release="production", job_name="mw_page_html_feature_counts_change_enrich"} > 1200
        for: 5m
        labels:
          team: data-engineering
          severity: warning
        annotations:
          summary: "High Kafka consumer lag for {{$labels.job_name}} in {{ $externalLabels.site }}"
          description: "Maximum lag of the consumed Kafka topic partition exceeds threshold"
          dashboard: 'https://grafana.wikimedia.org/d/K9x0c4aVk/flink-app?orgId=1&var-datasource={{ $externalLabels.site }}%20prometheus/k8s-dse&var-namespace={{ $labels.kubernetes_namespace }}&var-helm_release={{ $labels.release }}&var-operator_name=All&var-flink_job_name={{ $labels.job_name }}'
          dashboard_overview: 'https://grafana.wikimedia.org/d/jadfx6h/html-2b-edit-types'
          runbook: https://wikitech.wikimedia.org/wiki/MediaWiki_Event_Enrichment/HTML_Enrichment#Alerting
