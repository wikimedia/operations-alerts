rule_files:
  - cirrussearch_nodes.yaml

evaluation_interval: 1m

tests:

### ========================
### Main clusters' memory stall
### ========================

  - interval: 1m
    input_series:
      - series: 'node_pressure_memory_stalled_seconds_total{cluster="elasticsearch", instance="cirrussearch1111:9100", job="node", site="eqiad"}'
        values: '0+7x30'
    external_labels:
      site: eqiad
    alert_rule_test:
      - alertname: cirrusNodeMemoryStall
        eval_time: 15m
        exp_alerts:
          - exp_labels:
              cluster: elasticsearch
              instance: 'cirrussearch1111:9100'
              job: node
              severity: critical
              site: eqiad
              team: 'data-platform'
            exp_annotations:
              description: 'Memory stalled on cirrussearch1111:9100'
              summary: 'cirrussearch1111:9100 is stalled on memory, current value 11.67%'
              dashboard: https://grafana.wikimedia.org/d/popinski/node-exporter-cirrussearch-hosts?orgId=1&from=now-30m&to=now&timezone=browser&var-DS_PROMETHEUS=000000006&var-job=node&var-node=cirrussearch1111:9100&refresh=1m
              runbook: 'TODO'


