rule_files:
- kafka.yaml
evaluation_interval: 1m
tests:
- interval: 1m
  input_series:
    - series: kafka_cluster_Partition_ReplicasCount{site="eqiad", kafka_cluster="jumbo-eqiad", topic="test-topic", instance="kafka-jumbo1001:7800"}
      values: 3x720
    - series: kafka_cluster_Partition_ReplicasCount{site="eqiad", kafka_cluster="jumbo-eqiad", topic="test-topic", instance="kafka-jumbo1002:7800"}
      values: 0x720
    - series: kafka_cluster_Partition_ReplicasCount{site="eqiad", kafka_cluster="jumbo-eqiad", topic="test-topic", instance="kafka-jumbo1003:7800"}
      values: 0x720
    - series: kafka_log_Size{site="eqiad", kafka_cluster="jumbo-eqiad", topic="test-topic", partition="0"}
      values: 50500000000x720 # 50.5GB
  alert_rule_test:
  - alertname: LargeKafkaPartitionSize
    eval_time: 12h
    exp_alerts:
    - exp_labels:
        alertname: LargeKafkaPartitionSize
        severity: critical
        team: data-platform
        kafka_cluster: jumbo-eqiad
        topic: test-topic
      exp_annotations:
        description: Average topic partition size is above 50GB in jumbo-eqiad/test-topic
        summary: Average topic partition size is above 50GB in jumbo-eqiad/test-topic
        dashboard: https://grafana.wikimedia.org/d/000000234/kafka-by-topic?orgId=1&from=now-24h&to=now&timezone=utc&var-datasource=000000006&var-kafka_cluster=jumbo-eqiad&var-kafka_broker=%24__all&var-topic=test-topic
        runbook: https://wikitech.wikimedia.org/wiki/Kafka/Administration#Increase_a_topic's_partition_count_to_keep_partition_size_under_a_threshold
